<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hot Wheels — Moja Kolekcja</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root {
  --bg:#080810;--bg2:#0f0f1a;--surface:#14141f;--surface2:#1a1a2a;--surface3:#202035;
  --red:#e8290b;--red-dim:rgba(232,41,11,0.15);--yellow:#ffd000;--yellow-dim:rgba(255,208,0,0.12);
  --blue:#00b8ff;--blue-dim:rgba(0,184,255,0.1);--green:#00e676;
  --text:#eeeef5;--text2:#9090b0;--text3:#555575;--border:#252535;--border2:#303048;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}
.app{max-width:860px;margin:0 auto;padding:0 1rem 4rem;position:relative;z-index:1}
.header{padding:2rem 0 1.5rem;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem}
.hw-label{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:var(--red);margin-bottom:.2rem}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,7vw,4rem);letter-spacing:.04em;line-height:.95;color:#fff}
.stats-row{display:flex;gap:1.5rem;margin-top:.6rem}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--yellow);line-height:1}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3)}
.header-actions{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:flex-end}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:3px;padding:.6rem 1.1rem;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:#ff3e1a;transform:translateY(-1px);box-shadow:0 4px 16px rgba(232,41,11,.4)}
.btn-secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--red);color:var(--red)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-scan{background:var(--yellow);color:#000;font-weight:800}
.btn-scan:hover{background:#ffe033;transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,208,0,.4)}
.btn-icon{width:32px;height:32px;padding:0;display:flex;align-items:center;justify-content:center;font-size:1rem;border-radius:3px}
.sync-bar{display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-bottom:1.25rem;flex-wrap:wrap}
.sync-bar-label{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-right:.25rem;flex-shrink:0}
.sync-bar-actions{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.btn-sync{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;padding:.38rem .9rem;cursor:pointer;display:inline-flex;align-items:center;gap:.35rem;transition:all .15s;white-space:nowrap;border:1px solid var(--border2);background:var(--surface2);color:var(--text2)}
.btn-sync:hover{border-color:var(--blue);color:var(--blue)}
.btn-sync.export{border-color:rgba(0,184,255,.3);color:var(--blue)}
.btn-sync.export:hover{background:var(--blue-dim)}
.btn-sync.import{border-color:rgba(0,230,118,.3);color:var(--green)}
.btn-sync.import:hover{background:rgba(0,230,118,.08)}
.btn-sync.excel{border-color:rgba(0,200,83,.3);color:#00c853}
.btn-sync.excel:hover{background:rgba(0,200,83,.08)}
.sync-hint{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:var(--text3);letter-spacing:.04em;margin-left:auto}
.search-wrap{position:relative;margin-bottom:1.25rem}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:1rem;pointer-events:none}
input[type=text],input[type=number],select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:1rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%;padding:.7rem .9rem}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(232,41,11,.12)}
#searchInput{padding:.8rem 1rem .8rem 2.75rem;font-size:1rem;letter-spacing:.03em}
#searchInput::placeholder{color:var(--text3)}
.search-clear{position:absolute;right:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;display:none;padding:.25rem}
.search-clear.show{display:block}
.search-clear:hover{color:var(--text)}
.filter-row{display:flex;gap:.4rem;margin-bottom:1.5rem;flex-wrap:wrap}
.filter-btn{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;padding:.35rem .9rem;border-radius:2px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.filter-btn:hover{color:var(--text2);border-color:var(--border2)}
.filter-btn.active{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.sort-row{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;justify-content:space-between}
.results-count{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.sort-controls{display:flex;align-items:center;gap:.5rem}
.sort-label{font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3)}
select#sortSelect{padding:.35rem .7rem;width:auto;font-size:.85rem;color:var(--text2);cursor:pointer}
select option{background:var(--surface2)}
.view-toggle{display:flex;gap:.3rem}
.view-btn{background:transparent;border:1px solid var(--border);color:var(--text3);border-radius:3px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s}
.view-btn.active{background:var(--surface3);border-color:var(--border2);color:var(--text)}
#carGrid.grid-mode{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
#carGrid.list-mode{display:flex;flex-direction:column;gap:.5rem}
.car-card{background:var(--surface);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;cursor:pointer;position:relative;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.car-card:hover{transform:translateY(-3px);border-color:rgba(232,41,11,.4);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.car-card.list-mode{display:grid;grid-template-columns:56px 1fr auto;align-items:stretch;gap:0}
.list-mode .car-card .card-color-bar{grid-column:1/-1;height:2px}
.card-color-bar{height:3px;width:100%}
.card-thumb{background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2.2rem;color:var(--text3);position:relative;overflow:hidden}
.grid-mode .card-thumb{height:100px}
.list-mode .car-card .card-thumb{height:auto;min-height:56px;width:56px;font-size:1.4rem;align-self:stretch}
.card-body{padding:.85rem}
.list-mode .car-card .card-body{padding:.5rem .75rem;display:flex;flex-direction:column;justify-content:center}
.card-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.03em;color:var(--text);line-height:1.2;margin-bottom:.25rem}
.list-mode .car-card .card-name{font-size:.95rem}
.card-meta{font-family:'Barlow Condensed',sans-serif;font-size:.78rem;color:var(--text3);letter-spacing:.05em;margin-bottom:.3rem}
.card-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.3rem}
.list-mode .car-card .card-tags{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.2rem}
.tag{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .45rem;border-radius:2px}
.tag-series{background:var(--red-dim);color:var(--red);border:1px solid rgba(232,41,11,.2)}
.tag-year{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,208,0,.15)}
.tag-treasure{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.tag-super{background:rgba(0,184,255,.1);color:var(--blue);border:1px solid rgba(0,184,255,.15)}
.tag-silver{background:rgba(224,224,224,.1);color:#e0e0e0;border:1px solid rgba(224,224,224,.2)}
.tag-premium{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(255,208,0,.2)}
.card-actions{display:flex;gap:.3rem;padding:.5rem .75rem}
.list-mode .car-card .card-actions{flex-direction:column;align-items:flex-end;justify-content:center;padding:.5rem}
.empty-state{text-align:center;padding:5rem 2rem;color:var(--text3)}
.empty-icon{font-size:4rem;margin-bottom:1rem;opacity:.3}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.05em;color:var(--text2);margin-bottom:.5rem}
.empty-sub{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;letter-spacing:.1em;text-transform:uppercase}
.overlay{position:fixed;inset:0;background:rgba(5,5,12,.85);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:modalIn .2s ease;position:relative}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:1.25rem 1.5rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:2}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.05em;color:#fff}
.modal-close{background:none;border:none;color:var(--text3);font-size:1.3rem;cursor:pointer;transition:color .15s;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:1.5rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:.35rem}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3)}
textarea{resize:vertical;min-height:70px;font-size:.9rem;line-height:1.5}
.checkbox-row{display:flex;gap:.75rem 1rem;flex-wrap:wrap}
.checkbox-label{display:flex;align-items:center;gap:.4rem;font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.05em;cursor:pointer;color:var(--text2)}
.checkbox-label input[type=checkbox]{accent-color:var(--red);width:14px;height:14px}
.color-picker-row{display:flex;flex-wrap:wrap;gap:.4rem;width:100%}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.color-dot:hover{transform:scale(1.2)}
.color-dot.selected{border-color:#fff;transform:scale(1.2)}
.form-actions{display:flex;justify-content:flex-end;gap:.6rem;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border)}
.photo-upload-area{border:2px dashed var(--border2);border-radius:4px;background:var(--surface2);padding:1.25rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;overflow:hidden}
.photo-upload-area:hover{border-color:var(--red);background:var(--surface3)}
.photo-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-upload-icon{font-size:2rem;margin-bottom:.4rem;opacity:.5}
.photo-upload-label{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.photo-preview-wrap{position:relative;display:inline-block;width:100%}
.photo-preview{width:100%;max-height:180px;object-fit:contain;border-radius:3px;background:var(--surface2);display:block}
.photo-remove{position:absolute;top:6px;right:6px;background:rgba(10,10,20,.85);border:1px solid var(--border2);color:var(--text2);border-radius:3px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:all .15s;z-index:2}
.photo-remove:hover{background:var(--red);color:#fff;border-color:var(--red)}
.detail-photo{width:100%;max-height:220px;object-fit:contain;background:var(--surface2);border-bottom:1px solid var(--border);display:block}
.scanner-area{border:2px dashed var(--border2);border-radius:4px;background:var(--surface2);padding:1rem;text-align:center;position:relative;overflow:hidden}
#reader{width:100%}
#reader video{border-radius:4px}
.scan-hint{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:.75rem}
.scan-result{margin-top:1rem;padding:.75rem 1rem;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;color:var(--green);letter-spacing:.05em;display:none}
.scan-result.show{display:block}
.detail-color-bar{height:4px;width:100%;border-radius:6px 6px 0 0}
.detail-header{padding:1.5rem 1.5rem 0}
.detail-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.05em;line-height:1;color:#fff;margin-bottom:.3rem}
.detail-sub{font-family:'Barlow Condensed',sans-serif;font-size:.85rem;color:var(--text2);letter-spacing:.05em}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;padding:1.25rem 1.5rem}
.detail-field-label{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);margin-bottom:.2rem}
.detail-field-value{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:600;color:var(--text);letter-spacing:.02em}
.detail-notes{padding:0 1.5rem 1.5rem;font-size:.9rem;color:var(--text2);line-height:1.6;font-style:italic}
.detail-actions{padding:1rem 1.5rem 1.5rem;display:flex;gap:.6rem;border-top:1px solid var(--border)}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface3);border:1px solid var(--border2);border-radius:4px;padding:.75rem 1.25rem;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;letter-spacing:.05em;color:var(--text);z-index:999;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.success{border-color:rgba(0,230,118,.3);color:var(--green)}
.toast.error{border-color:rgba(232,41,11,.3);color:var(--red)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:768px){
  .app{padding:0 .75rem 5rem}
  h1{font-size:2.8rem}
  .form-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr 1fr}
  .modal{max-width:100%;margin:0;border-radius:12px 12px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:92vh}
  .overlay{align-items:flex-end;padding:0}
}
@media(max-width:600px){
  .header{flex-direction:column;align-items:flex-start;gap:.75rem;padding:1.25rem 0 1rem}
  .header-actions{display:none}
  .stats-row{gap:1.25rem}
  #carGrid.grid-mode{grid-template-columns:repeat(2,1fr);gap:.6rem}
  .sort-row{flex-wrap:wrap;gap:.5rem}
  .sort-controls{width:100%;justify-content:space-between}
  .sort-label{display:none}
  select#sortSelect{flex:1;font-size:.82rem;padding:.4rem .6rem}
  .filter-row{gap:.3rem}
  .filter-btn{font-size:.72rem;padding:.3rem .65rem}
  .modal-body{padding:1rem}
  .modal-header{padding:1rem 1rem .75rem}
  .detail-grid{grid-template-columns:1fr 1fr;gap:.5rem}
  .form-actions{flex-direction:column-reverse}
  .form-actions .btn{width:100%;justify-content:center}
  .sync-hint{display:none}
  .sync-bar{padding:.5rem .75rem}
  .mobile-fab{position:fixed;bottom:1.25rem;right:1.25rem;display:flex;gap:.6rem;z-index:50}
  .fab-btn{width:52px;height:52px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .2s}
  .fab-btn:active{transform:scale(.94)}
  .fab-add{background:var(--red)}
  .fab-scan{background:var(--yellow)}
}
@media(min-width:601px){.mobile-fab{display:none}}
@media(hover:none){
  .btn{min-height:44px}
  .filter-btn{min-height:38px}
  .car-card:hover{transform:none}
  input[type=text],input[type=number],select,textarea,#searchInput{font-size:16px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="hw-label">🔥 Hot Wheels</div>
      <h1>Moja Kolekcja</h1>
      <div class="stats-row">
        <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">Modeli</span></div>
        <div class="stat"><span class="stat-num" id="statTreasure">0</span><span class="stat-label">Treasure Hunt</span></div>
        <div class="stat"><span class="stat-num" id="statValue">0</span><span class="stat-label">Łącznie PLN</span></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-scan" onclick="openScanner()">📷 Skanuj barcode</button>
      <button class="btn btn-primary" onclick="openAddModal()">＋ Dodaj ręcznie</button>
    </div>
  </header>

  <div class="sync-bar">
    <span class="sync-bar-label">☁️ Sync</span>
    <div class="sync-bar-actions">
      <button class="btn-sync export" onclick="exportJSON()">⬇️ Eksportuj JSON</button>
      <button class="btn-sync import" onclick="document.getElementById('importFile').click()">⬆️ Importuj JSON</button>
      <button class="btn-sync excel" onclick="exportExcel()">📊 Eksportuj Excel</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
    <span class="sync-hint">Eksportuj na telefonie → przenieś plik → importuj na komputerze</span>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Szukaj — nazwa, seria, rok, kod…" oninput="onSearch(this)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" onclick="setFilter('all',this)">Wszystkie</button>
    <button class="filter-btn" onclick="setFilter('treasure',this)">🎯 Treasure Hunt</button>
    <button class="filter-btn" onclick="setFilter('super',this)">⭐ Super TH</button>
    <button class="filter-btn" onclick="setFilter('silver',this)">🥈 Silver Series</button>
    <button class="filter-btn" onclick="setFilter('premium',this)">💎 Premium</button>
  </div>

  <div class="sort-row">
    <span class="results-count" id="resultsCount">0 modeli</span>
    <div class="sort-controls">
      <span class="sort-label">Sortuj:</span>
      <select id="sortSelect" onchange="renderList()">
        <option value="added_desc">📅 Ostatnio dodane</option>
        <option value="added_asc">📅 Najstarsze pierwsze</option>
        <option value="name_asc">🔤 Nazwa A–Z</option>
        <option value="name_desc">🔤 Nazwa Z–A</option>
        <option value="series_asc">📂 Seria A–Z</option>
        <option value="series_desc">📂 Seria Z–A</option>
        <option value="year_desc">📆 Rok najnowsze</option>
        <option value="year_asc">📆 Rok najstarsze</option>
        <option value="catalog_asc">🏷 Nr katalogowy A-Z</option>
        <option value="catalog_desc">🏷 Nr katalogowy Z-A</option>
        <option value="seriesnum_asc">🔢 Nr w serii rosnąco</option>
        <option value="seriesnum_desc">🔢 Nr w serii malejąco</option>
        <option value="collectionnum_asc">📊 Nr w kolekcji rosnąco</option>
        <option value="collectionnum_desc">📊 Nr w kolekcji malejąco</option>

<div class="toast" id="toast"></div>

<script>
var COLORS = [
  {hex:'#ff0000',name:'Czerwony'},{hex:'#e8290b',name:'Czerwony ciemny'},{hex:'#b71c1c',name:'Bordowy'},
  {hex:'#ff6680',name:'Rozowy'},{hex:'#e91e63',name:'Karmazynowy'},
  {hex:'#ff6a00',name:'Pomaranczowy'},{hex:'#ff9800',name:'Pomaranczowy jasny'},{hex:'#ffd000',name:'Zolty'},
  {hex:'#ffee58',name:'Zolty jasny'},{hex:'#f9a825',name:'Bursztynowy'},
  {hex:'#00c853',name:'Zielony'},{hex:'#1b5e20',name:'Zielony ciemny'},{hex:'#69f0ae',name:'Mietowy'},
  {hex:'#8bc34a',name:'Limonkowy'},{hex:'#004d40',name:'Butelkowa zielen'},
  {hex:'#00b8ff',name:'Niebieski'},{hex:'#1565c0',name:'Niebieski ciemny'},{hex:'#0d47a1',name:'Granatowy'},
  {hex:'#40c4ff',name:'Blekitny'},{hex:'#006064',name:'Morski'},{hex:'#00bcd4',name:'Turkusowy'},
  {hex:'#aa00ff',name:'Fioletowy'},{hex:'#6a1b9a',name:'Fioletowy ciemny'},{hex:'#ce93d8',name:'Lawendowy'},
  {hex:'#880e4f',name:'Sliwkowy'},
  {hex:'#f5f5f5',name:'Bialy'},{hex:'#e0e0e0',name:'Srebrny'},{hex:'#9e9e9e',name:'Szary'},
  {hex:'#555575',name:'Szary ciemny'},{hex:'#212121',name:'Czarny'},
  {hex:'#c8860a',name:'Zloty'},{hex:'#b8860b',name:'Zloty ciemny'},{hex:'#8d6e63',name:'Brazowy'},
  {hex:'#4e342e',name:'Ciemny braz'},{hex:'#78909c',name:'Stalowy'},{hex:'#546e7a',name:'Stalowy ciemny'},
  {hex:'#cfd8dc',name:'Chrome'}
];

var COLOR_GROUPS = [
  {label:'Czerwienie / Roze', keys:['#ff0000','#e8290b','#b71c1c','#ff6680','#e91e63']},
  {label:'Pomaranczowe / Zolte', keys:['#ff6a00','#ff9800','#ffd000','#ffee58','#f9a825']},
  {label:'Zielenie', keys:['#00c853','#1b5e20','#69f0ae','#8bc34a','#004d40']},
  {label:'Niebieskie', keys:['#00b8ff','#1565c0','#0d47a1','#40c4ff','#006064','#00bcd4']},
  {label:'Fiolety', keys:['#aa00ff','#6a1b9a','#ce93d8','#880e4f']},
  {label:'Biele / Szarosci', keys:['#f5f5f5','#e0e0e0','#9e9e9e','#555575','#212121']},
  {label:'Metaliki / Specjalne', keys:['#c8860a','#b8860b','#8d6e63','#4e342e','#78909c','#546e7a','#cfd8dc']}
];

var COLOR_MAP = {};
COLORS.forEach(function(c){ COLOR_MAP[c.hex] = c.name; });

var db = JSON.parse(localStorage.getItem('hw_db') || '[]');
var editingId = null;
var selectedColor = COLORS[0].hex;
var currentFilter = 'all';
var currentView = 'grid';
var searchQuery = '';
var scanner = null;
var currentPhotoData = null;

function init() {
  buildColorPicker();
  renderList();
  updateStats();
}

// COLOR PICKER
function buildColorPicker() {
  var wrap = document.getElementById('colorPicker');
  var html = '';
  COLOR_GROUPS.forEach(function(g) {
    html += '<div style="width:100%"><div style="font-family:Barlow Condensed,sans-serif;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin:.5rem 0 .3rem">' + g.label + '</div><div style="display:flex;flex-wrap:wrap;gap:.35rem">';
    g.keys.forEach(function(hex) {
      var light = (hex === '#f5f5f5' || hex === '#ffee58' || hex === '#e0e0e0' || hex === '#cfd8dc');
      var sel = (hex === selectedColor) ? 'selected' : '';
      html += '<div class="color-dot ' + sel + '" style="background:' + hex + (light ? ';border-color:#555' : '') + '" title="' + (COLOR_MAP[hex]||hex) + '" onclick="pickColor(\'' + hex + '\',this)"></div>';
    });
    html += '</div></div>';
  });
  wrap.innerHTML = html;
}

function pickColor(hex, el) {
  selectedColor = hex;
  document.querySelectorAll('.color-dot').forEach(function(d){ d.classList.remove('selected'); });
  el.classList.add('selected');
}

// PHOTO
function handlePhotoUpload(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    compressImage(e.target.result, 800, 0.82, function(compressed) {
      currentPhotoData = compressed;
      showPhotoPreview(compressed);
    });
  };
  reader.readAsDataURL(file);
}

function compressImage(dataUrl, maxWidth, quality, callback) {
  var img = new Image();
  img.onload = function() {
    var canvas = document.createElement('canvas');
    var w = img.width, h = img.height;
    if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

function showPhotoPreview(src) {
  document.getElementById('photoPlaceholder').style.display = 'none';
  document.getElementById('photoPreviewWrap').style.display = 'block';
  document.getElementById('photoPreview').src = src;
  document.getElementById('photoUploadArea').style.cursor = 'default';
  document.getElementById('f_photo').style.display = 'none';
}

function removePhoto(e) {
  if (e && e.stopPropagation) e.stopPropagation();
  currentPhotoData = null;
  document.getElementById('photoPlaceholder').style.display = 'block';
  document.getElementById('photoPreviewWrap').style.display = 'none';
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoUploadArea').style.cursor = 'pointer';
  document.getElementById('f_photo').style.display = 'block';
  document.getElementById('f_photo').value = '';
}

// STATS
function updateStats() {
  document.getElementById('statTotal').textContent = db.length;
  document.getElementById('statTreasure').textContent = db.filter(function(c){ return c.treasure || c.super; }).length;
  var total = db.reduce(function(s,c){ return s + (parseFloat(c.price)||0); }, 0);
  document.getElementById('statValue').textContent = total.toFixed(0);
}

// FILTER / SORT / RENDER
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  renderList();
}

function setView(v) {
  currentView = v;
  var grid = document.getElementById('carGrid');
  grid.className = (v === 'grid') ? 'grid-mode' : 'list-mode';
  document.getElementById('btnGrid').classList.toggle('active', v === 'grid');
  document.getElementById('btnList').classList.toggle('active', v === 'list');
  renderList();
}

function onSearch(el) {
  searchQuery = el.value.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('show', searchQuery.length > 0);
  renderList();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  searchQuery = '';
  renderList();
}

function natNum(s) {
  if (!s) return 9999;
  var m = String(s).trim().match(/^(\d+)/);
  return m ? parseInt(m[1], 10) : 9999;
}

function getFiltered() {
  var list = db.slice();
  if (currentFilter === 'treasure') list = list.filter(function(c){ return c.treasure && !c.super; });
  if (currentFilter === 'super') list = list.filter(function(c){ return c.super; });
  if (currentFilter === 'silver') list = list.filter(function(c){ return c.silver; });
  if (currentFilter === 'premium') list = list.filter(function(c){ return c.premium; });

  if (searchQuery) {
    list = list.filter(function(c) {
      return (c.name||'').toLowerCase().indexOf(searchQuery) > -1
          || (c.series||'').toLowerCase().indexOf(searchQuery) > -1
          || (c.year||'').toString().indexOf(searchQuery) > -1
          || (c.catalog||'').toLowerCase().indexOf(searchQuery) > -1
          || (c.barcode||'').indexOf(searchQuery) > -1
          || (c.notes||'').toLowerCase().indexOf(searchQuery) > -1;
    });
  }

  var sort = document.getElementById('sortSelect').value;
  var sorters = {
    added_desc: function(a,b){ return b.id - a.id; },
    added_asc:  function(a,b){ return a.id - b.id; },
    name_asc:   function(a,b){ return (a.name||'').localeCompare(b.name||'','pl'); },
    name_desc:  function(a,b){ return (b.name||'').localeCompare(a.name||'','pl'); },
    series_asc: function(a,b){ return (a.series||'').localeCompare(b.series||'','pl'); },
    series_desc:function(a,b){ return (b.series||'').localeCompare(a.series||'','pl'); },
    year_desc:  function(a,b){ return (parseInt(b.year)||0)-(parseInt(a.year)||0); },
    year_asc:   function(a,b){ return (parseInt(a.year)||0)-(parseInt(b.year)||0); },
    catalog_asc: function(a,b){ return (a.catalog||'').localeCompare(b.catalog||'','pl'); },
    catalog_desc:function(a,b){ return (b.catalog||'').localeCompare(a.catalog||'','pl'); },
    seriesnum_asc:  function(a,b){ return natNum(a.seriesNum)-natNum(b.seriesNum); },
    seriesnum_desc: function(a,b){ return natNum(b.seriesNum)-natNum(a.seriesNum); },
    collectionnum_asc:  function(a,b){ return natNum(a.collectionNum)-natNum(b.collectionNum); },
    collectionnum_desc: function(a,b){ return natNum(b.collectionNum)-natNum(a.collectionNum); },
    price_asc:  function(a,b){ return (parseFloat(a.price)||0)-(parseFloat(b.price)||0); },
    price_desc: function(a,b){ return (parseFloat(b.price)||0)-(parseFloat(a.price)||0); }
  };
  if (sorters[sort]) list.sort(sorters[sort]);
  return list;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function plural(n) {
  if (n===1) return 'model';
  if (n>=2 && n<=4) return 'modele';
  return 'modeli';
}

function renderList() {
  var list = getFiltered();
  var grid = document.getElementById('carGrid');
  document.getElementById('resultsCount').textContent = list.length + ' ' + plural(list.length);

  if (list.length === 0) {
    var msg1 = db.length === 0 ? 'Kolekcja pusta' : 'Brak wynikow';
    var msg2 = db.length === 0 ? 'Dodaj pierwszy model przez skan lub recznie' : 'Zmien filtry lub fraze wyszukiwania';
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🏎️</div><div class="empty-title">' + msg1 + '</div><p class="empty-sub">' + msg2 + '</p></div>';
    return;
  }
  grid.innerHTML = list.map(renderCard).join('');
}

function renderCard(car) {
  var color = car.color || '#555575';
  var isList = currentView === 'list';
  var tags = '';
  if (car.treasure && !car.super) tags += '<span class="tag tag-treasure">TH</span>';
  if (car.super) tags += '<span class="tag tag-super">Super TH</span>';
  if (car.premium) tags += '<span class="tag tag-premium">💎 Premium</span>';
  if (car.silver) tags += '<span class="tag tag-silver">🥈 Silver</span>';
  if (car.pack2) tags += '<span class="tag tag-series">2-Pack</span>';
  if (car.pack3) tags += '<span class="tag tag-series">3-Pack</span>';
  if (car.pack5) tags += '<span class="tag tag-series">5-Pack</span>';
  if (car.series) tags += '<span class="tag tag-series">' + esc(car.series) + '</span>';
  if (car.year) tags += '<span class="tag tag-year">' + esc(car.year) + '</span>';

  var thumb = car.photo
    ? '<img src="' + car.photo + '" alt="' + esc(car.name) + '" style="width:100%;height:100%;object-fit:cover">'
    : '<span style="font-size:' + (isList?'1.4':'2') + 'rem">🚗</span>';

  var meta = [car.catalog, car.seriesNum || car.collectionNum].filter(Boolean).join(' · ') || '&nbsp;';
  var priceSpan = (isList && car.price) ? '<span style="font-family:Bebas Neue,sans-serif;font-size:1.1rem;color:var(--yellow);padding:0 .3rem">' + parseFloat(car.price).toFixed(0) + ' PLN</span>' : '';

  return '<div class="car-card' + (isList?' list-mode':'') + '" onclick="openDetail(' + car.id + ')">'
    + '<div class="card-color-bar" style="background:' + color + '"></div>'
    + '<div class="card-thumb">' + thumb + '</div>'
    + '<div class="card-body">'
    + '<div class="card-name">' + esc(car.name) + '</div>'
    + '<div class="card-meta">' + meta + '</div>'
    + '<div class="card-tags">' + tags + '</div>'
    + '</div>'
    + '<div class="card-actions" onclick="event.stopPropagation()">'
    + priceSpan
    + '<button class="btn btn-icon btn-ghost" onclick="openEditModal(' + car.id + ')">✏️</button>'
    + '<button class="btn btn-icon btn-ghost" style="color:var(--text3)" onclick="deleteCar(' + car.id + ')">🗑</button>'
    + '</div>'
    + '</div>';
}

// DETAIL
function fieldHtml(label, value) {
  return '<div class="detail-field"><div class="detail-field-label">' + label + '</div><div class="detail-field-value">' + value + '</div></div>';
}

function openDetail(id) {
  var car = db.find(function(c){ return c.id === id; });
  if (!car) return;
  var color = car.color || '#555575';
  var flags = '';
  if (car.treasure) flags += '<span class="tag tag-treasure">🎯 Treasure Hunt</span>';
  if (car.super) flags += '<span class="tag tag-super">⭐ Super TH</span>';
  if (car.firstEdition) flags += '<span class="tag tag-series">🆕 First Edition</span>';
  if (car.sealed) flags += '<span class="tag tag-series">📦 Zafoliowany</span>';
  if (car.premium) flags += '<span class="tag tag-premium">💎 Premium</span>';
  if (car.silver) flags += '<span class="tag tag-silver">🥈 Silver Series</span>';
  if (car.pack2) flags += '<span class="tag tag-series">✌️ 2-Pack</span>';
  if (car.pack3) flags += '<span class="tag tag-series">3️⃣ 3-Pack</span>';
  if (car.pack5) flags += '<span class="tag tag-series">5️⃣ 5-Pack</span>';

  var colorDot = car.color ? '<span style="display:inline-block;width:12px;height:12px;background:' + car.color + ';border-radius:50%;vertical-align:middle;margin-right:5px;border:1px solid #444"></span>' + (COLOR_MAP[car.color]||car.color) : '—';

  var html = car.photo
    ? '<img class="detail-photo" src="' + car.photo + '" alt="' + esc(car.name) + '">'
    : '<div class="detail-color-bar" style="background:' + color + '"></div>';

  html += '<div class="detail-header"><div class="detail-name">' + esc(car.name) + '</div>'
    + '<div class="detail-sub">' + ([car.series, car.catalog].filter(Boolean).join(' · ') || 'Brak danych') + '</div>'
    + '<div class="card-tags" style="margin-top:.5rem">' + flags + '</div></div>';

  html += '<div class="detail-grid">'
    + fieldHtml('Rok', car.year || '—')
    + fieldHtml('Kolor', colorDot)
    + fieldHtml('Cena zakupu', car.price ? parseFloat(car.price).toFixed(2) + ' PLN' : '—')
    + fieldHtml('Nr w serii', car.seriesNum || '—')
    + fieldHtml('Nr w kolekcji', car.collectionNum || '—')
    + fieldHtml('Barcode', car.barcode || '—')
    + '</div>';

  if (car.notes) html += '<div class="detail-notes">"' + esc(car.notes) + '"</div>';

  html += '<div class="detail-actions">'
    + '<button class="btn btn-secondary" onclick="openEditModal(' + car.id + ');closeModal(\'detailOverlay\')">✏️ Edytuj</button>'
    + '<button class="btn btn-ghost" style="color:var(--red);border-color:rgba(232,41,11,.2)" onclick="deleteCar(' + car.id + ');closeModal(\'detailOverlay\')">🗑 Usuń</button>'
    + '</div>';

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('show');
}

// ADD / EDIT
function openAddModal(prefill) {
  prefill = prefill || {};
  editingId = null;
  document.getElementById('addModalTitle').textContent = 'Nowy Model';
  clearForm();
  if (prefill.barcode) document.getElementById('f_barcode').value = prefill.barcode;
  if (prefill.name) document.getElementById('f_name').value = prefill.name;
  document.getElementById('addOverlay').classList.add('show');
}

function openEditModal(id) {
  var car = db.find(function(c){ return c.id === id; });
  if (!car) return;
  editingId = id;
  document.getElementById('addModalTitle').textContent = 'Edytuj Model';
  document.getElementById('f_name').value = car.name || '';
  document.getElementById('f_series').value = car.series || '';
  document.getElementById('f_year').value = car.year || '';
  document.getElementById('f_catalog').value = car.catalog || '';
  document.getElementById('f_price').value = car.price || '';
  document.getElementById('f_seriesNum').value = car.seriesNum || '';
  document.getElementById('f_collectionNum').value = car.collectionNum || '';
  document.getElementById('f_barcode').value = car.barcode || '';
  document.getElementById('f_notes').value = car.notes || '';
  document.getElementById('f_treasure').checked = !!car.treasure;
  document.getElementById('f_super').checked = !!car.super;
  document.getElementById('f_firstEdition').checked = !!car.firstEdition;
  document.getElementById('f_sealed').checked = !!car.sealed;
  document.getElementById('f_premium').checked = !!car.premium;
  document.getElementById('f_silver').checked = !!car.silver;
  document.getElementById('f_pack2').checked = !!car.pack2;
  document.getElementById('f_pack3').checked = !!car.pack3;
  document.getElementById('f_pack5').checked = !!car.pack5;
  selectedColor = car.color || COLORS[0].hex;
  buildColorPicker();
  currentPhotoData = car.photo || null;
  if (car.photo) { showPhotoPreview(car.photo); } else { removePhoto(null); }
  document.getElementById('addOverlay').classList.add('show');
}

function clearForm() {
  ['f_name','f_series','f_year','f_catalog','f_price','f_seriesNum','f_collectionNum','f_barcode','f_notes'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  ['f_treasure','f_super','f_firstEdition','f_sealed','f_premium','f_silver','f_pack2','f_pack3','f_pack5'].forEach(function(id){
    document.getElementById(id).checked = false;
  });
  selectedColor = COLORS[0].hex;
  buildColorPicker();
  currentPhotoData = null;
  document.getElementById('photoPlaceholder').style.display = 'block';
  document.getElementById('photoPreviewWrap').style.display = 'none';
  document.getElementById('photoPreview').src = '';
  document.getElementById('photoUploadArea').style.cursor = 'pointer';
  document.getElementById('f_photo').style.display = 'block';
  document.getElementById('f_photo').value = '';
}

function saveCar() {
  var name = document.getElementById('f_name').value.trim();
  if (!name) { showToast('Wpisz nazwe modelu!', 'error'); return; }
  var car = {
    id: editingId || Date.now(),
    name: name,
    series: document.getElementById('f_series').value.trim(),
    year: document.getElementById('f_year').value.trim(),
    catalog: document.getElementById('f_catalog').value.trim(),
    color: selectedColor,
    price: document.getElementById('f_price').value.trim(),
    seriesNum: document.getElementById('f_seriesNum').value.trim(),
    collectionNum: document.getElementById('f_collectionNum').value.trim(),
    barcode: document.getElementById('f_barcode').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
    treasure: document.getElementById('f_treasure').checked,
    super: document.getElementById('f_super').checked,
    firstEdition: document.getElementById('f_firstEdition').checked,
    sealed: document.getElementById('f_sealed').checked,
    premium: document.getElementById('f_premium').checked,
    silver: document.getElementById('f_silver').checked,
    pack2: document.getElementById('f_pack2').checked,
    pack3: document.getElementById('f_pack3').checked,
    pack5: document.getElementById('f_pack5').checked,
    photo: currentPhotoData || null
  };
  if (editingId) {
    var idx = db.findIndex(function(c){ return c.id === editingId; });
    if (idx !== -1) db[idx] = car;
    showToast('Model zaktualizowany', 'success');
  } else {
    db.unshift(car);
    showToast('Dodano do kolekcji', 'success');
  }
  saveDb();
  closeModal('addOverlay');
  renderList();
  updateStats();
}

function deleteCar(id) {
  if (!confirm('Usunac ten model z kolekcji?')) return;
  db = db.filter(function(c){ return c.id !== id; });
  saveDb();
  renderList();
  updateStats();
  showToast('Usunieto', '');
}

function saveDb() { localStorage.setItem('hw_db', JSON.stringify(db)); }

// SCANNER
function openScanner() {
  document.getElementById('scanOverlay').classList.add('show');
  document.getElementById('scanResult').classList.remove('show');
  document.getElementById('manualBarcode').value = '';
  setTimeout(function() {
    if (scanner) { try { scanner.clear(); } catch(e){} }
    scanner = new Html5Qrcode('reader');
    scanner.start(
      {facingMode:'environment'},
      {fps:10, qrbox:{width:280,height:120}},
      function(code) { handleScanResult(code); },
      function() {}
    ).catch(function() {
      var r = document.getElementById('scanResult');
      r.textContent = 'Brak dostepu do kamery. Wpisz kod recznie.';
      r.classList.add('show');
    });
  }, 300);
}

function handleScanResult(code) {
  if (scanner) { try { scanner.stop(); } catch(e){} }
  var r = document.getElementById('scanResult');
  r.textContent = 'Zeskanowano: ' + code;
  r.classList.add('show');
  setTimeout(function(){ lookupBarcode(code); }, 600);
}

function lookupBarcode(code) {
  if (!code || !code.trim()) return;
  code = code.trim();
  var existing = db.find(function(c){ return c.barcode === code; });
  if (existing) {
    closeScanner();
    showToast('"' + existing.name + '" jest juz w kolekcji!', '');
    setTimeout(function(){ openDetail(existing.id); }, 300);
    return;
  }
  closeScanner();
  setTimeout(function(){
    if (confirm('Kod: ' + code + '\n\nNie znaleziono w kolekcji.\nDodac nowy model z tym kodem?')) {
      openAddModal({barcode: code});
    }
  }, 350);
}

function closeScanner() {
  document.getElementById('scanOverlay').classList.remove('show');
  if (scanner) {
    try { scanner.stop().then(function(){ scanner.clear(); }); } catch(e){}
    scanner = null;
  }
}

// MODALS
function closeModal(id) {
  document.getElementById(id).classList.remove('show');
  if (id === 'scanOverlay') closeScanner();
}

function overlayClick(e, id) {
  if (e.target.id === id) closeModal(id);
}

// TOAST
var toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.className = 'toast'; }, 3000);
}

// EXPORT / IMPORT JSON
function exportJSON() {
  var payload = {app:'HotWheelsKolekcja', version:1, exported:new Date().toISOString(), count:db.length, cars:db};
  var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'hotwheels_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Wyeksportowano ' + db.length + ' modeli', 'success');
}

function importJSON(event) {
  var file = event.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      var cars = Array.isArray(data) ? data : (data.cars || []);
      if (!Array.isArray(cars) || cars.length === 0) throw new Error('Brak danych');
      if (db.length > 0) {
        var replace = confirm('Importujesz ' + cars.length + ' modeli.\n\nOK = ZASTAP kolekcje\nAnuluj = DOLACZ do istniejacych');
        if (replace) {
          db = cars;
          showToast('Zaimportowano ' + cars.length + ' modeli', 'success');
        } else {
          var existingIds = {};
          db.forEach(function(c){ existingIds[c.id] = true; });
          var newCars = cars.filter(function(c){ return !existingIds[c.id]; });
          db = db.concat(newCars);
          showToast('Dolaczono ' + newCars.length + ' nowych modeli', 'success');
        }
      } else {
        db = cars;
        showToast('Zaimportowano ' + cars.length + ' modeli', 'success');
      }
      saveDb(); renderList(); updateStats();
    } catch(err) {
      showToast('Blad importu: ' + err.message, 'error');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// EXPORT EXCEL (CSV)
function exportExcel() {
  if (db.length === 0) { showToast('Kolekcja jest pusta!', 'error'); return; }
  var headers = ['Nazwa modelu','Seria','Rok','Nr katalogowy','Nr w serii','Nr w kolekcji rocznej','Kolor','Cena (PLN)','Barcode EAN','Treasure Hunt','Super TH','First Edition','Zafoliowany','Premium','Silver Series','2-Pack','3-Pack','5-Pack','Notatki'];
  function b(v){ return v ? 'TAK' : ''; }
  function escCsv(v) {
    var s = String(v);
    if (s.indexOf(';') > -1 || s.indexOf('"') > -1 || s.indexOf('\n') > -1) return '"' + s.replace(/"/g,'""') + '"';
    return s;
  }
  var rows = db.map(function(c){
    return [
      c.name||'', c.series||'', c.year||'', c.catalog||'',
      c.seriesNum||'', c.collectionNum||'',
      (COLOR_MAP[c.color]||c.color||''),
      c.price||'', c.barcode||'',
      b(c.treasure), b(c.super), b(c.firstEdition), b(c.sealed),
      b(c.premium), b(c.silver), b(c.pack2), b(c.pack3), b(c.pack5),
      (c.notes||'').replace(/\n/g,' ')
    ];
  });
  var csv = [headers].concat(rows).map(function(row){ return row.map(escCsv).join(';'); }).join('\r\n');
  var blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'hotwheels_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Excel: wyeksportowano ' + db.length + ' modeli', 'success');
}
